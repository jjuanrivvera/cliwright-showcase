# Runs on every PR: validate the registry against the schema. A malformed or duplicate
# entry fails here, so a bad submission can never merge or reach the live site.
name: Validate registry
on:
  pull_request:
    paths: ["registry/**", "schema/**", "scripts/**"]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - run: pip install --quiet pyyaml jsonschema
      - name: Validate + build registry.json
        run: python3 scripts/build.py
