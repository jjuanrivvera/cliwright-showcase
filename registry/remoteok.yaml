name: remoteok
binary: remoteok
description: RemoteOK remote jobs from the terminal — search and filter the public jobs feed with agent-friendly JSON output.
wraps: RemoteOK API
repo: https://github.com/jjuanrivvera/remoteok-cli
author: jjuanrivvera
install:
  brew: brew install jjuanrivvera/remoteok-cli/remoteok-cli
  scoop: scoop install https://raw.githubusercontent.com/jjuanrivvera/scoop-remoteok-cli/main/remoteok-cli.json
  go: go install github.com/jjuanrivvera/remoteok-cli/cmd/remoteok@latest
  script: curl -fsSL https://raw.githubusercontent.com/jjuanrivvera/remoteok-cli/main/install.sh | sh
tags: [jobs, remote-work, job-search, ai-agent]
agent_ready: true
