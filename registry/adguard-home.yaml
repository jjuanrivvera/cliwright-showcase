name: adguard-home
binary: adguard-home
description: Manage AdGuard Home DNS filtering — clients, blocked services, rewrites, filters, and the query log.
wraps: AdGuard Home API
repo: https://github.com/jjuanrivvera/adguard-cli
author: jjuanrivvera
install:
  brew: brew install jjuanrivvera/adguard-cli/adguard-cli
  scoop: scoop install https://raw.githubusercontent.com/jjuanrivvera/scoop-adguard-cli/main/adguard-cli.json
  go: go install github.com/jjuanrivvera/adguard-cli/cmd/adguard-home@latest
  script: curl -fsSL https://raw.githubusercontent.com/jjuanrivvera/adguard-cli/main/install.sh | sh
tags: [dns, homelab, self-hosted]
agent_ready: true
