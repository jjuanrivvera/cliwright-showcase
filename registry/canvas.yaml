name: canvas
binary: canvas
description: Canvas LMS from the terminal — courses, enrollments, assignments, submissions, and grades.
wraps: Canvas LMS API
repo: https://github.com/jjuanrivvera/canvas-cli
author: jjuanrivvera
install:
  brew: brew install jjuanrivvera/canvas-cli/canvas-cli
  scoop: scoop install https://raw.githubusercontent.com/jjuanrivvera/scoop-canvas-cli/main/canvas-cli.json
  go: go install github.com/jjuanrivvera/canvas-cli/cmd/canvas@latest
  script: curl -fsSL https://raw.githubusercontent.com/jjuanrivvera/canvas-cli/main/install.sh | sh
tags: [education, lms, ai-agent]
agent_ready: true
