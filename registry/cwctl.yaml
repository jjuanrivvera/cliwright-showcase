name: cwctl
binary: cwctl
description: Drive the full Chatwoot API — conversations, contacts, reports, plus backup/restore and cross-instance sync.
wraps: Chatwoot
repo: https://github.com/jjuanrivvera/cwctl
author: jjuanrivvera
install:
  brew: brew install jjuanrivvera/cwctl/cwctl-cli
  scoop: scoop install https://raw.githubusercontent.com/jjuanrivvera/scoop-cwctl/main/cwctl.json
  go: go install github.com/jjuanrivvera/cwctl/cmd/cwctl@latest
  script: curl -fsSL https://raw.githubusercontent.com/jjuanrivvera/cwctl/main/install.sh | sh
tags: [customer-support, messaging, ai-agent]
agent_ready: true
