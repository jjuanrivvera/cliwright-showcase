name: alegra
binary: alegra
description: Alegra accounting from the terminal — invoices, contacts, payments, and DIAN/SAT e-invoicing.
wraps: Alegra API
repo: https://github.com/jjuanrivvera/alegra-cli
author: jjuanrivvera
install:
  brew: brew install jjuanrivvera/alegra-cli/alegra-cli
  scoop: scoop install https://raw.githubusercontent.com/jjuanrivvera/scoop-alegra-cli/main/alegra-cli.json
  go: go install github.com/jjuanrivvera/alegra-cli/cmd/alegra@latest
  script: curl -fsSL https://raw.githubusercontent.com/jjuanrivvera/alegra-cli/main/install.sh | sh
tags: [accounting, finance, ai-agent]
agent_ready: true
