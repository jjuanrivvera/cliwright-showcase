name: tgctl
binary: tgctl
description: The Telegram Bot API from the terminal — send, receive, and manage bots and updates.
wraps: Telegram Bot API
repo: https://github.com/jjuanrivvera/tgctl
author: jjuanrivvera
install:
  brew: brew install jjuanrivvera/tgctl/tgctl-cli
  scoop: scoop install https://raw.githubusercontent.com/jjuanrivvera/scoop-tgctl/main/tgctl.json
  go: go install github.com/jjuanrivvera/tgctl/cmd/tgctl@latest
  script: curl -fsSL https://raw.githubusercontent.com/jjuanrivvera/tgctl/main/install.sh | sh
tags: [messaging, bots, ai-agent]
agent_ready: true
